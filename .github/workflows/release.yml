name: Release APK

# Fires when a Release is published on GitHub (any tag name/format — created via the
# web UI, `gh release create`, etc.), or manually from the Actions tab. Builds the APK
# and attaches it to that release without touching its title/notes.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Nome da versão (ex.: 1.1.0) — cria a release se ela ainda não existir'
        required: true
        default: '1.0.0'

permissions:
  contents: write

jobs:
  build-and-attach-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Build APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Resolve tag and version name
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version_name }}" >> "$GITHUB_OUTPUT"
            echo "name=${{ github.event.inputs.version_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
            echo "name=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Rename APK for release
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/app-debug.apk "release/RegaVaranda-${{ steps.version.outputs.name }}.apk"

      - name: Attach APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: release/RegaVaranda-${{ steps.version.outputs.name }}.apk
